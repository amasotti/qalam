<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2a74"/>
      <stop offset="100%" stop-color="#1a1753"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none"
        stroke="#f59e0b" stroke-width="0.4" opacity="0.3"/>

  <!-- Arabic letter qaf — first letter of قلم -->
  <text x="16" y="24"
    font-family="'Noto Naskh Arabic','Arabic Typesetting','Traditional Arabic','Scheherazade New',serif"
    font-size="21" font-weight="bold"
    text-anchor="middle"
    fill="url(#letter)"
    xml:lang="ar">ق</text>
</svg>
