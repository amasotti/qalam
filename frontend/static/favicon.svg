<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d1710"/>

  <!-- Green border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none"
        stroke="#16a34a" stroke-width="1.2" opacity="0.60"/>

  <!-- Arabic ق (qaf — first letter of قلم), white for contrast at small sizes -->
  <text x="16" y="22"
    font-family="'Noto Naskh Arabic','Amiri','Scheherazade New','Traditional Arabic',serif"
    font-size="20" font-weight="700"
    text-anchor="middle"
    fill="white" opacity="0.92"
    xml:lang="ar">ق</text>

  <!-- Red accent bar — echoes the banner's margin divider -->
  <rect x="6" y="27.5" width="20" height="2.5" rx="1" fill="#dc2626" opacity="0.75"/>
</svg>
