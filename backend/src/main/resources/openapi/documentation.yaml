            - 2SM
            - 2SF
            - 3SM
            - 3SF
            - 2D
            - 3DM
            - 3DF
            - 1P
            - 2PM
            - 2PF
            - 3PM
            - 3PF
        arabic:
          type: string
        segments:
          type: array
