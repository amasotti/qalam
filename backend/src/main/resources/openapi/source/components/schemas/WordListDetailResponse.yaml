  id:
    type: string
    format: uuid
  title:
    type: string
  description:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
  words:
    type: array
    items:
      $ref: ./WordResponse.yaml
