    PartOfSpeech:
      type: string
      enum: [UNKNOWN, NOUN, VERB, ADJECTIVE, ADVERB, PREPOSITION, PARTICLE, INTERJECTION, CONJUNCTION, PRONOUN]

    Dialect:
      type: string
      enum: [TUNISIAN, MOROCCAN, EGYPTIAN, GULF, LEVANTINE, MSA, IRAQI]

    Difficulty:
      type: string
      enum: [BEGINNER, INTERMEDIATE, ADVANCED]

    MasteryLevel:
      type: string
      enum: [NEW, LEARNING, KNOWN, MASTERED]

    DictionarySource:
      type: string
      enum: [ALMANY, LIVING_ARABIC, DERJA_NINJA, REVERSO, WIKTIONARY, ARABIC_STUDENT_DICTIONARY, LANGENSCHEIDT, CUSTOM]

    # --- Common ---

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code

    PaginatedResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
          format: int64
          description: Total number of matching records
        page:
          type: integer
          description: Current page (1-based)
        size:
          type: integer
          description: Page size requested
