services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: qalam
      POSTGRES_USER: qalam
      POSTGRES_PASSWORD: qalam
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qalam -d qalam"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
