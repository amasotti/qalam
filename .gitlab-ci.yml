stages:
  - test
  - build
  - release

# ── Defaults ──────────────────────────────────────────────────────────────────
default:
  # Cancel running pipeline when a newer one starts (≈ cancel-in-progress: true)
  interruptible: true

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

# ── When to create a pipeline at all ─────────────────────────────────────────
workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'   # semver tags → release pipeline
    - if: '$CI_COMMIT_BRANCH == "main"'             # pushes to main
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'  # MRs (≈ pull_request)
    - if: '$CI_PIPELINE_SOURCE == "web"'            # manual trigger from UI

# ── Backend: Detekt + tests + coverage ───────────────────────────────────────
# Tests use Testcontainers (PostgreSQL) — Docker daemon required.
# DinD (non-TLS) provides it; Testcontainers connects via DOCKER_HOST.
backend:
  stage: test
  image: eclipse-temurin:25-jdk
  services:
    - name: docker:27-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Ryuk needs to reach back to Docker; disable it to avoid socket race in CI
    TESTCONTAINERS_RYUK_DISABLED: "true"
  cache:
    key: "gradle-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/
      - backend/.gradle/
  script:
    - cd backend && ./gradlew check koverXmlReport
  artifacts:
    when: always
    paths:
      - backend/build/reports/kover/report.xml
    expire_in: 2 days
    reports:
      # Surfaces test results natively in the MR/pipeline UI
      junit: backend/build/test-results/**/*.xml

# ── Frontend: lint + type-check + build ──────────────────────────────────────
frontend:
  stage: test
  image: node:24-alpine
  cache:
    key: "pnpm-$CI_COMMIT_REF_SLUG"
    paths:
      - .pnpm-store/
      - frontend/node_modules/
  before_script:
    - corepack enable && corepack prepare pnpm@10 --activate
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm lint
    - pnpm check
    - pnpm build

# ── OpenAPI lint (after backend — spec is a source file) ─────────────────────
openapi-lint:
  stage: test
  image: node:24-alpine
  needs: [backend]
  script:
    - npx --yes @redocly/cli@latest lint
      backend/src/main/resources/openapi/documentation.yaml

# ── Docker: validate image builds ────────────────────────────────────────────
docker-build:
  stage: build
  needs: [backend]
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_BUILDKIT: "1"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t qalam-backend:ci backend/

# ── E2E: Playwright (skip on tag pipelines — release runs CI checks already) ─
e2e:
  stage: test
  image: eclipse-temurin:25-jdk
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never        # don't duplicate on tag/release pipelines
    - when: on_success
  services:
    - name: postgres:17
      alias: postgres
      variables:
        POSTGRES_DB: qalam
        POSTGRES_USER: qalam
        POSTGRES_PASSWORD: qalam
  variables:
    DATABASE_URL: jdbc:postgresql://postgres:5432/qalam
    DATABASE_USER: qalam
    DATABASE_PASSWORD: qalam
  cache:
    key: "gradle-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/
  before_script:
    # Install Node.js (temurin image is Debian-based)
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
    - apt-get install -y -qq nodejs
    - npm install -g pnpm@10
    # Build and start backend
    - cd $CI_PROJECT_DIR/backend && ./gradlew installDist
    - cd $CI_PROJECT_DIR
    - nohup backend/build/install/qalam-backend/bin/qalam-backend > /tmp/backend.log 2>&1 &
    - |
      for i in $(seq 1 30); do
        curl -sf http://localhost:8085/api/v1/words > /dev/null 2>&1 && echo "Backend ready after ${i}s" && break
        echo "Waiting... ($i/30)"; sleep 2
        if [ "$i" = "30" ]; then echo "=== Backend failed ===" && cat /tmp/backend.log && exit 1; fi
      done
    # Frontend deps + Playwright
    - cd $CI_PROJECT_DIR/frontend && pnpm install --frozen-lockfile
    - pnpm exec playwright install --with-deps chromium
  script:
    - CI=true pnpm exec playwright test
  after_script:
    # after_script runs in a fresh shell; file system is shared
    - if [ "$CI_JOB_STATUS" = "failed" ]; then cat /tmp/backend.log 2>/dev/null || true; fi
  artifacts:
    when: always
    paths:
      - frontend/playwright-report/
    expire_in: 3 days

# ── Release: generate changelog with git-cliff ────────────────────────────────
generate-changelog:
  stage: release
  image: orhun/git-cliff:latest
  needs: [backend, frontend, openapi-lint, docker-build]
  before_script:
    # Ensure full tag history is available
    - git fetch --tags --unshallow 2>/dev/null || git fetch --tags
  script:
    - git-cliff --latest --strip header --config .github/cliff.toml -o RELEASE_NOTES.md
    - cat RELEASE_NOTES.md
  artifacts:
    paths:
      - RELEASE_NOTES.md
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

# ── Release: create GitLab release from the changelog artifact ────────────────
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [generate-changelog]
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: './RELEASE_NOTES.md'  # path to artifact file
    ref: '$CI_COMMIT_SHA'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
