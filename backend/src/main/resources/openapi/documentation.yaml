openapi: "3.0.3"
info:
  title: Qalam API
  description: Personal Arabic learning tool — backend API
  version: "0.1.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8085
    description: Local development

tags:
  - name: roots
    description: Arabic root management
  - name: words
    description: Vocabulary word management
  - name: texts
    description: Arabic text management
  - name: sentences
    description: Sentence and alignment token management
  - name: system
    description: Health and API introspection

paths:
  /api/v1/roots:
    get:
      summary: List Arabic roots
      operationId: listRoots
      tags: [roots]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: letterCount
          in: query
          description: Filter by number of root letters (2–6)
          schema: { type: integer, minimum: 2, maximum: 6 }
      responses:
        "200":
          description: Paginated list of roots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a new Arabic root
      operationId: createRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRootRequest"
      responses:
        "201":
          description: Root created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/normalize:
    post:
      summary: Normalize an Arabic root input without persisting it
      operationId: normalizeRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NormalizeRequest"
      responses:
        "200":
          description: Normalized form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/{id}:
    get:
      summary: Get a root by ID
      operationId: getRootById
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Root found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a root's meaning or analysis
      operationId: updateRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRootRequest"
      responses:
        "200":
          description: Root updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a root
      operationId: deleteRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Root deleted
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words:
    get:
      summary: List vocabulary words with optional filters
      operationId: listWords
      tags: [words]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: q
          in: query
          description: Arabic text substring search
          schema: { type: string }
        - name: dialect
          in: query
          schema: { $ref: "#/components/schemas/Dialect" }
        - name: difficulty
          in: query
          schema: { $ref: "#/components/schemas/Difficulty" }
        - name: partOfSpeech
          in: query
          schema: { $ref: "#/components/schemas/PartOfSpeech" }
        - name: masteryLevel
          in: query
          schema: { $ref: "#/components/schemas/MasteryLevel" }
      responses:
        "200":
          description: Paginated list of words
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/WordResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a vocabulary word
      operationId: createWord
      tags: [words]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordRequest"
      responses:
        "201":
          description: Word created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "422":
          description: Validation error (blank arabicText, unknown enum value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/autocomplete:
    get:
      summary: Lightweight word search for linking operations
      operationId: autocompleteWords
      tags: [words]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Matching words (id + arabicText + translation only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordAutocompleteResponse"
        "400":
          description: Missing required query parameter `q`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}:
    get:
      summary: Get a word by ID
      operationId: getWordById
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a word (all fields optional — only provided fields change)
      operationId: updateWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWordRequest"
      responses:
        "200":
          description: Word updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a word
      operationId: deleteWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Word deleted
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links:
    get:
      summary: List dictionary links for a word
      operationId: listDictionaryLinks
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of dictionary links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add a dictionary link to a word
      operationId: addDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDictionaryLinkRequest"
      responses:
        "201":
          description: Link added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unknown dictionary source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links/{linkId}:
    delete:
      summary: Remove a dictionary link from a word
      operationId: deleteDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: linkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Link removed
        "404":
          description: Word or link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/examples:
    post:
      summary: Generate AI example sentences for a word
      operationId: generateWordExamples
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Two example sentences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamplesResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts:
    get:
      summary: List texts with optional filters
      operationId: listTexts
      tags: [texts]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: q
          in: query
          description: Free-text search across title and body
          schema: { type: string }
        - name: dialect
          in: query
          schema: { $ref: "#/components/schemas/Dialect" }
        - name: difficulty
          in: query
          schema: { $ref: "#/components/schemas/Difficulty" }
        - name: tag
          in: query
          description: Filter by tag (exact match)
          schema: { type: string }
      responses:
        "200":
          description: Paginated list of texts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/TextResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a text
      operationId: createText
      tags: [texts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTextRequest"
      responses:
        "201":
          description: Text created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "422":
          description: Validation error (blank title or body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{id}:
    get:
      summary: Get a text by ID
      operationId: getTextById
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Text found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a text (all fields optional — only provided fields change)
      operationId: updateText
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTextRequest"
      responses:
        "200":
          description: Text updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a text
      operationId: deleteText
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Text deleted
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{id}/summarize:
    post:
      summary: Generate an AI summary of a text
      operationId: summarizeText
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Generated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{textId}/sentences:
    get:
      summary: List sentences for a text
      operationId: listSentences
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Array of sentences (no pagination)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a sentence in a text
      operationId: createSentence
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSentenceRequest"
      responses:
        "201":
          description: Sentence created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error (blank arabicText, unknown enum value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{textId}/sentences/{id}:
    get:
      summary: Get a sentence by ID
      operationId: getSentenceById
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Sentence found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a sentence (all fields optional — only provided fields change)
      operationId: updateSentence
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSentenceRequest"
      responses:
        "200":
          description: Sentence updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a sentence
      operationId: deleteSentence
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Sentence deleted
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{textId}/sentences/{id}/tokens:
    put:
      summary: Replace all alignment tokens for a sentence
      operationId: replaceTokens
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceTokensRequest"
      responses:
        "200":
          description: Tokens replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Clear all alignment tokens for a sentence
      operationId: clearTokens
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: confirm
          in: query
          required: true
          description: Must be set to "true" to confirm clearing tokens
          schema: { type: string, enum: ["true"] }
      responses:
        "200":
          description: Tokens cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "400":
          description: Missing or invalid confirm parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{textId}/sentences/{id}/auto-tokenize:
    post:
      summary: Auto-tokenize a sentence using AI
      operationId: autoTokenize
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tokens generated and set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{textId}/sentences/{id}/transliterate:
    post:
      summary: Generate transliteration for a sentence using AI
      operationId: transliterateSentence
      tags: [sentences]
      parameters:
        - name: textId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Transliteration generated and set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceResponse"
        "404":
          description: Sentence or text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          description: Bad request

  /api/v1/swagger-ui:
    get:
      summary: Swagger UI
      operationId: getSwaggerUi
      tags: [system]
      responses:
        "200":
          description: Swagger UI HTML
        "400":
          description: Bad request

security: []

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    # --- Roots ---

    RootResponse:
      type: object
      required: [id, letters, normalizedForm, displayForm, letterCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
