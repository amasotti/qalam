post:
  summary: AI-suggest 2–5 root-family words (ephemeral preview, never auto-saved)
  operationId: suggestWordsForRoot
  tags:
    - roots
    - ai
  parameters:
    - $ref: ../components/parameters/UuidPathId.yaml
  responses:
    '200':
      description: Root-family word suggestions generated via AI
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RootWordSuggestionsResponse.yaml
    '400':
      description: Malformed UUID or invalid AI response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: Root not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '503':
      description: AI not configured
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
