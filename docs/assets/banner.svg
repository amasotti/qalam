<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320"
     role="img" aria-label="Qalam — Personal Arabic Learning Tool">
  <defs>
    <!-- Background glow behind the star decoration -->
    <radialGradient id="starGlow" cx="200" cy="160" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#312e81" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft vignette on the right edge -->
    <linearGradient id="rightFade" x1="0.6" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Gold gradient for accent text -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- ── Base background ── -->
  <rect width="1200" height="320" fill="#0f172a"/>

  <!-- ── Warm purple glow behind the khatam ── -->
  <rect width="1200" height="320" fill="url(#starGlow)"/>

  <!-- ── Right-edge vignette ── -->
  <rect width="1200" height="320" fill="url(#rightFade)"/>


  <!-- ══════════════════════════════════════
       KHATAM DECORATION  (left section)
       All paths are centred on (200, 160).
       8-pointed stars: outer(R), inner(r)
       sin 22.5° ≈ 0.3827  cos 22.5° ≈ 0.9239
       sin 45°  ≈ 0.7071  cos 45°  ≈ 0.7071
       sin 67.5° ≈ 0.9239  cos 67.5° ≈ 0.3827
  ════════════════════════════════════════ -->

  <!-- Outer concentric ring -->
  <circle cx="200" cy="160" r="152"
          fill="none" stroke="#f59e0b" stroke-width="0.6" opacity="0.15"/>

  <!-- Large star  R=130, r=50 — outline only -->
  <path transform="translate(200,160)"
        d="M0,-130 L19.1,-46.2 L91.9,-91.9 L46.2,-19.1 L130,0
           L46.2,19.1 L91.9,91.9 L19.1,46.2 L0,130
           L-19.1,46.2 L-91.9,91.9 L-46.2,19.1 L-130,0
           L-46.2,-19.1 L-91.9,-91.9 L-19.1,-46.2 Z"
        fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.22"/>

  <!-- Medium ring between the two stars -->
  <circle cx="200" cy="160" r="90"
          fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.12"/>

  <!-- Medium star  R=78, r=30 — very subtle fill -->
  <path transform="translate(200,160)"
        d="M0,-78 L11.5,-27.7 L55.2,-55.2 L27.7,-11.5 L78,0
           L27.7,11.5 L55.2,55.2 L11.5,27.7 L0,78
           L-11.5,27.7 L-55.2,55.2 L-27.7,11.5 L-78,0
           L-27.7,-11.5 L-55.2,-55.2 L-11.5,-27.7 Z"
        fill="#f59e0b" opacity="0.05"/>
  <path transform="translate(200,160)"
        d="M0,-78 L11.5,-27.7 L55.2,-55.2 L27.7,-11.5 L78,0
           L27.7,11.5 L55.2,55.2 L11.5,27.7 L0,78
           L-11.5,27.7 L-55.2,55.2 L-27.7,11.5 L-78,0
           L-27.7,-11.5 L-55.2,-55.2 L-11.5,-27.7 Z"
        fill="none" stroke="#f59e0b" stroke-width="0.7" opacity="0.28"/>

  <!-- Inner ring -->
  <circle cx="200" cy="160" r="50"
          fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.18"/>

  <!-- Small star  R=42, r=16 — solid gold, moderate opacity -->
  <path transform="translate(200,160)"
        d="M0,-42 L6.1,-14.8 L29.7,-29.7 L14.8,-6.1 L42,0
           L14.8,6.1 L29.7,29.7 L6.1,14.8 L0,42
           L-6.1,14.8 L-29.7,29.7 L-14.8,6.1 L-42,0
           L-14.8,-6.1 L-29.7,-29.7 L-6.1,-14.8 Z"
        fill="none" stroke="#f59e0b" stroke-width="0.9" opacity="0.40"/>

  <!-- Centre jewel -->
  <circle cx="200" cy="160" r="4" fill="#f59e0b" opacity="0.55"/>
  <circle cx="200" cy="160" r="2" fill="#fcd34d" opacity="0.8"/>

  <!-- Faint echo star — far right corner -->
  <path transform="translate(1095,62)"
        d="M0,-32 L4.7,-11.4 L22.6,-22.6 L11.4,-4.7 L32,0
           L11.4,4.7 L22.6,22.6 L4.7,11.4 L0,32
           L-4.7,11.4 L-22.6,22.6 L-11.4,4.7 L-32,0
           L-11.4,-4.7 L-22.6,-22.6 L-4.7,-11.4 Z"
        fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.09"/>


  <!-- ══════════════════════════════════════
       SEPARATOR
  ════════════════════════════════════════ -->
  <line x1="450" y1="46" x2="450" y2="274"
        stroke="#1e293b" stroke-width="1.5"/>


  <!-- ══════════════════════════════════════
       TEXT  (right section, x > 450)
  ════════════════════════════════════════ -->

  <!-- Arabic "قلم" — large, dominant, right-aligned -->
  <text x="1000" y="210"
    font-family="'Noto Naskh Arabic','Amiri','Scheherazade New','Traditional Arabic','Arabic Typesetting',serif"
    font-size="132" font-weight="700"
    text-anchor="end"
    fill="#f1f5f9"
    xml:lang="ar" direction="rtl">قلم</text>

  <!-- Thin horizontal accent between Arabic and Latin text -->
  <line x1="490" y1="226" x2="800" y2="226"
        stroke="#334155" stroke-width="0.8"/>

  <!-- "QALAM" — spaced Latin, amber gradient -->
  <text x="490" y="253"
    font-family="'Helvetica Neue','Segoe UI','Arial',sans-serif"
    font-size="17" font-weight="300"
    letter-spacing="11"
    fill="url(#goldGrad)">QALAM</text>

  <!-- Tagline -->
  <text x="490" y="278"
    font-family="'Helvetica Neue','Segoe UI','Arial',sans-serif"
    font-size="13" font-weight="300"
    letter-spacing="2.5"
    fill="#475569">Personal Arabic Learning Tool</text>
</svg>
