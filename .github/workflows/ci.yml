name: CI - Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:


jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main
      - name: Detekt
        run: nix develop --command bash -c "cd backend && ./gradlew detekt --no-daemon"
      - name: Run tests
        run: nix develop --command bash -c "cd backend && ./gradlew test --no-daemon"
