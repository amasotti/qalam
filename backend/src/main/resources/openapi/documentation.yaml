openapi: "3.0.3"
info:
  title: Qalam API
  description: Personal Arabic learning tool — backend API
  version: "0.1.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8085
    description: Local development

tags:
  - name: roots
    description: Arabic root management
  - name: words
    description: Vocabulary word management
  - name: system
    description: Health and API introspection

paths:
  /api/v1/roots:
    get:
      summary: List Arabic roots
      operationId: listRoots
      tags: [roots]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: letterCount
          in: query
          description: Filter by number of root letters (2–6)
          schema: { type: integer, minimum: 2, maximum: 6 }
      responses:
        "200":
          description: Paginated list of roots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a new Arabic root
      operationId: createRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRootRequest"
      responses:
        "201":
          description: Root created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/normalize:
    post:
      summary: Normalize an Arabic root input without persisting it
      operationId: normalizeRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NormalizeRequest"
      responses:
        "200":
          description: Normalized form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/{id}:
    get:
      summary: Get a root by ID
      operationId: getRootById
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Root found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a root's meaning or analysis
      operationId: updateRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRootRequest"
      responses:
        "200":
          description: Root updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a root
      operationId: deleteRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Root deleted
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words:
    get:
      summary: List vocabulary words with optional filters
      operationId: listWords
      tags: [words]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: q
          in: query
          description: Arabic text substring search
          schema: { type: string }
        - name: dialect
          in: query
          schema: { $ref: "#/components/schemas/Dialect" }
        - name: difficulty
          in: query
          schema: { $ref: "#/components/schemas/Difficulty" }
        - name: partOfSpeech
          in: query
          schema: { $ref: "#/components/schemas/PartOfSpeech" }
        - name: masteryLevel
          in: query
          schema: { $ref: "#/components/schemas/MasteryLevel" }
      responses:
        "200":
          description: Paginated list of words
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/WordResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a vocabulary word
      operationId: createWord
      tags: [words]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordRequest"
      responses:
        "201":
          description: Word created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "422":
          description: Validation error (blank arabicText, unknown enum value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/autocomplete:
    get:
      summary: Lightweight word search for linking operations
      operationId: autocompleteWords
      tags: [words]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Matching words (id + arabicText + translation only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordAutocompleteResponse"
        "400":
          description: Missing required query parameter `q`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}:
    get:
      summary: Get a word by ID
      operationId: getWordById
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a word (all fields optional — only provided fields change)
      operationId: updateWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWordRequest"
      responses:
        "200":
          description: Word updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a word
      operationId: deleteWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Word deleted
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links:
    get:
      summary: List dictionary links for a word
      operationId: listDictionaryLinks
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of dictionary links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add a dictionary link to a word
      operationId: addDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDictionaryLinkRequest"
      responses:
        "201":
          description: Link added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unknown dictionary source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links/{linkId}:
    delete:
      summary: Remove a dictionary link from a word
      operationId: deleteDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: linkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Link removed
        "404":
          description: Word or link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/examples:
    post:
      summary: Generate AI example sentences for a word
      operationId: generateWordExamples
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Two example sentences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamplesResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          description: Bad request

  /api/v1/swagger-ui:
    get:
      summary: Swagger UI
      operationId: getSwaggerUi
      tags: [system]
      responses:
        "200":
          description: Swagger UI HTML
        "400":
          description: Bad request

security: []

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    # --- Roots ---

    RootResponse:
      type: object
      required: [id, letters, normalizedForm, displayForm, letterCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRootRequest:
      type: object
      required: [root]
      properties:
        root:
          type: string
          description: "Letters in any format: space/dash/comma-separated or concatenated"
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    UpdateRootRequest:
      type: object
      properties:
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    NormalizeRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: "Letters in any supported format: space-separated, dash-separated, comma-separated, or concatenated"

    NormalizeResponse:
      type: object
      required: [letters, normalizedForm, displayForm, letterCount]
      properties:
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer

    # --- Words ---

    WordResponse:
      type: object
      required: [id, arabicText, partOfSpeech, dialect, difficulty, masteryLevel, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        arabicText:
          type: string
        transliteration:
          type: string
          nullable: true
        translation:
          type: string
          nullable: true
        exampleSentence:
          type: string
          nullable: true
        partOfSpeech:
          $ref: "#/components/schemas/PartOfSpeech"
        dialect:
          $ref: "#/components/schemas/Dialect"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        masteryLevel:
          $ref: "#/components/schemas/MasteryLevel"
        pronunciationUrl:
          type: string
          nullable: true
        rootId:
          type: string
          format: uuid
          nullable: true
        derivedFromId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWordRequest:
      type: object
      required: [arabicText]
      properties:
        arabicText:
          type: string
        transliteration:
          type: string
          nullable: true
        translation:
          type: string
          nullable: true
        exampleSentence:
          type: string
          nullable: true
        partOfSpeech:
          allOf:
            - $ref: "#/components/schemas/PartOfSpeech"
          default: UNKNOWN
        dialect:
          allOf:
            - $ref: "#/components/schemas/Dialect"
          default: MSA
        difficulty:
          allOf:
            - $ref: "#/components/schemas/Difficulty"
          default: BEGINNER
        pronunciationUrl:
          type: string
          nullable: true
        rootId:
          type: string
          format: uuid
          nullable: true
        derivedFromId:
          type: string
          format: uuid
          nullable: true

    UpdateWordRequest:
      type: object
      description: All fields optional — only provided fields are updated
      properties:
        arabicText:
          type: string
          nullable: true
        transliteration:
          type: string
          nullable: true
        translation:
          type: string
          nullable: true
        exampleSentence:
          type: string
          nullable: true
        partOfSpeech:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PartOfSpeech"
        dialect:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Dialect"
        difficulty:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Difficulty"
        masteryLevel:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MasteryLevel"
        pronunciationUrl:
          type: string
          nullable: true
        rootId:
          type: string
          format: uuid
          nullable: true
        derivedFromId:
          type: string
          format: uuid
          nullable: true

    WordAutocompleteResponse:
      type: object
      required: [id, arabicText]
      properties:
        id:
          type: string
          format: uuid
        arabicText:
          type: string
        translation:
          type: string
          nullable: true

    DictionaryLinkResponse:
      type: object
      required: [id, source, url]
      properties:
        id:
          type: string
          format: uuid
        source:
          $ref: "#/components/schemas/DictionarySource"
        url:
          type: string
          format: uri

    CreateDictionaryLinkRequest:
      type: object
      required: [source, url]
      properties:
        source:
          $ref: "#/components/schemas/DictionarySource"
        url:
          type: string
          format: uri

    ExampleSentenceResponse:
      type: object
      required: [arabic, transliteration, translation]
      properties:
        arabic:
          type: string
        transliteration:
          type: string
        translation:
          type: string

    ExamplesResponse:
      type: object
      required: [examples]
      properties:
        examples:
          type: array
          items:
            $ref: "#/components/schemas/ExampleSentenceResponse"

    # --- Enums ---

    PartOfSpeech:
      type: string
      enum: [UNKNOWN, NOUN, VERB, ADJECTIVE, ADVERB, PREPOSITION, PARTICLE, INTERJECTION, CONJUNCTION, PRONOUN]

    Dialect:
      type: string
      enum: [TUNISIAN, MOROCCAN, EGYPTIAN, GULF, LEVANTINE, MSA, IRAQI]

    Difficulty:
      type: string
      enum: [BEGINNER, INTERMEDIATE, ADVANCED]

    MasteryLevel:
      type: string
      enum: [NEW, LEARNING, KNOWN, MASTERED]

    DictionarySource:
      type: string
      enum: [ALMANY, LIVING_ARABIC, DERJA_NINJA, REVERSO, WIKTIONARY, ARABIC_STUDENT_DICTIONARY, LANGENSCHEIDT, CUSTOM]

    # --- Common ---

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code

    PaginatedResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
          format: int64
          description: Total number of matching records
        page:
          type: integer
          description: Current page (1-based)
        size:
          type: integer
          description: Page size requested
