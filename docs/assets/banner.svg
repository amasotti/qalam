<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320"
     role="img" aria-label="Qalam — Personal Arabic Learning Tool">
  <defs>
    <!-- ── Backgrounds ── -->
    <radialGradient id="bg" cx="0.38" cy="0.5" r="0.68">
      <stop offset="0%"   stop-color="#152219"/>
      <stop offset="100%" stop-color="#050c06"/>
    </radialGradient>

    <!-- ── Arabic letter gradient: cream → light green → forest ── -->
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0fdf4"/>
      <stop offset="38%"  stop-color="#86efac"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>

    <!-- ── Glow halo on Arabic text ── -->
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Soft atmospheric bloom (background only, very diffuse) ── -->
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="55"/>
    </filter>

    <!-- ── Geometric lattice tile 32×32 ── -->
    <pattern id="lat" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <line x1="0"  y1="16" x2="32" y2="16" stroke="#4ade80" stroke-width="0.35"/>
      <line x1="16" y1="0"  x2="16" y2="32" stroke="#4ade80" stroke-width="0.35"/>
      <line x1="0"  y1="0"  x2="32" y2="32" stroke="#4ade80" stroke-width="0.22"/>
      <line x1="32" y1="0"  x2="0"  y2="32" stroke="#4ade80" stroke-width="0.22"/>
      <circle cx="0"  cy="0"  r="1.1" fill="#4ade80"/>
      <circle cx="32" cy="0"  r="1.1" fill="#4ade80"/>
      <circle cx="0"  cy="32" r="1.1" fill="#4ade80"/>
      <circle cx="32" cy="32" r="1.1" fill="#4ade80"/>
      <circle cx="16" cy="16" r="1.4" fill="#4ade80"/>
    </pattern>

    <!-- ── Khatam 8-pointed star path (R=22, r=9, centred at 0,0) ── -->
    <!-- Vertices: outer at every 45°, inner at every 45° offset 22.5°   -->
    <!-- sin/cos 22.5°: 0.3827/0.9239 · 45°: 0.7071/0.7071 · 67.5°: 0.9239/0.3827 -->
  </defs>

  <!-- ── Base ── -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- ── Lattice texture over full canvas ── -->
  <rect width="1200" height="320" fill="url(#lat)" opacity="0.07"/>

  <!-- ── Atmospheric bloom: green halo behind Arabic area ── -->
  <ellipse cx="420" cy="158" rx="295" ry="168"
           fill="#16a34a" opacity="0.11" filter="url(#bloom)"/>

  <!-- ── Khatam ornament, upper-right corner (translated to 1134, 56) ── -->
  <!-- Outer ring -->
  <circle cx="1134" cy="58" r="48" fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.20"/>
  <!-- Large star R=36, r=14 -->
  <path transform="translate(1134,58)"
        d="M0,-36 L5.35,-13.3 L25.46,-25.46 L13.3,-5.35 L36,0
           L13.3,5.35 L25.46,25.46 L5.35,13.3 L0,36
           L-5.35,13.3 L-25.46,25.46 L-13.3,5.35 L-36,0
           L-13.3,-5.35 L-25.46,-25.46 L-5.35,-13.3 Z"
        fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.28"/>
  <!-- Medium ring -->
  <circle cx="1134" cy="58" r="25" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.16"/>
  <!-- Small star R=18, r=7 -->
  <path transform="translate(1134,58)"
        d="M0,-18 L2.68,-6.65 L12.73,-12.73 L6.65,-2.68 L18,0
           L6.65,2.68 L12.73,12.73 L2.68,6.65 L0,18
           L-2.68,6.65 L-12.73,12.73 L-6.65,2.68 L-18,0
           L-6.65,-2.68 L-12.73,-12.73 L-2.68,-6.65 Z"
        fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.24"/>
  <!-- Centre jewel -->
  <circle cx="1134" cy="58" r="3.5" fill="#22c55e" opacity="0.40"/>

  <!-- ── Echo ornament, lower-left (smaller) ── -->
  <circle cx="66" cy="262" r="30" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.14"/>
  <path transform="translate(66,262)"
        d="M0,-22 L3.26,-8.12 L15.56,-15.56 L8.12,-3.26 L22,0
           L8.12,3.26 L15.56,15.56 L3.26,8.12 L0,22
           L-3.26,8.12 L-15.56,15.56 L-8.12,3.26 L-22,0
           L-8.12,-3.26 L-15.56,-15.56 L-3.26,-8.12 Z"
        fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.18"/>
  <circle cx="66" cy="262" r="3" fill="#22c55e" opacity="0.25"/>

  <!-- ════════════════════════════════════════
       ARABIC قلم — the hero
  ════════════════════════════════════════ -->

  <!-- Pass 1: glow (blurred duplicate, green tint) -->
  <text x="425" y="232"
    font-family="'Noto Naskh Arabic','Amiri','Scheherazade New','Traditional Arabic',serif"
    font-size="212" font-weight="700"
    text-anchor="middle"
    fill="#22c55e" opacity="0.20"
    filter="url(#glow)"
    xml:lang="ar">قلم</text>

  <!-- Pass 2: crisp, gradient-filled -->
  <text x="425" y="232"
    font-family="'Noto Naskh Arabic','Amiri','Scheherazade New','Traditional Arabic',serif"
    font-size="212" font-weight="700"
    text-anchor="middle"
    fill="url(#ag)"
    xml:lang="ar">قلم</text>

  <!-- ════════════════════════════════════════
       SEPARATOR
  ════════════════════════════════════════ -->
  <line x1="720" y1="38" x2="720" y2="282" stroke="#dc2626" stroke-width="1" opacity="0.50"/>

  <!-- ════════════════════════════════════════
       LATIN IDENTITY (right panel)
  ════════════════════════════════════════ -->

  <!-- "QALAM" — bold serif, white -->
  <text x="762" y="156"
    font-family="Georgia,'Times New Roman',serif"
    font-size="64" font-weight="700"
    letter-spacing="14"
    fill="white" opacity="0.92">QALAM</text>

  <!-- Red accent underline -->
  <line x1="762" y1="170" x2="1078" y2="170" stroke="#dc2626" stroke-width="2" opacity="0.72"/>

  <!-- Tagline — white, readable -->
  <text x="764" y="200"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="13.5" font-weight="300"
    letter-spacing="3.8"
    fill="white" opacity="0.60">Personal Arabic Learning Tool</text>

  <!-- ── Bottom anchor line (full width) ── -->
  <rect x="0" y="314" width="1200" height="3" fill="#dc2626" opacity="0.40"/>
</svg>
