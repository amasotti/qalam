post:
  summary: Review an ephemeral production-practice sentence
  description: Validates the learner's seven displayed target IDs and submits the sentence to the configured AI reviewer. Neither the request nor feedback is persisted.
  operationId: reviewProductionPracticeSentence
  tags:
    - production-practice
    - ai
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ReviewProductionPracticeRequest.yaml
        example:
          sentence: أكتب كتابًا كبيرًا في البيت.
          targetWordIds:
            - 11111111-1111-1111-1111-111111111111
            - 22222222-2222-2222-2222-222222222222
            - 33333333-3333-3333-3333-333333333333
            - 44444444-4444-4444-4444-444444444444
            - 55555555-5555-5555-5555-555555555555
            - 66666666-6666-6666-6666-666666666666
            - 77777777-7777-7777-7777-777777777777
          usedWordIds:
            - 11111111-1111-1111-1111-111111111111
            - 33333333-3333-3333-3333-333333333333
  responses:
    '200':
      description: Markdown AI review for the submitted sentence
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProductionPracticeReviewResponse.yaml
          example:
            reviewMarkdown: |-
              ## What I understood
              I understand: “I am writing a big book at home.” The meaning is clear.

              ## Target words
              **كِتَاب** and **كَتَبَ** are used naturally.

              ## Corrections and a natural version
              No essential correction is needed.

              ## Alternatives
              You can front **في البيت** to emphasise the location.

              ## Overall feedback
              This is a clear, natural sentence with good target-word use.
    '400':
      description: Malformed UUID or invalid AI provider response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: One or more target words do not exist
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '422':
      description: Sentence or selected-word validation failed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '503':
      description: AI not configured (OPENROUTER_API_KEY missing)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
