type: object
description: Ephemeral Markdown feedback from the AI reviewer. It is never stored or used for SRS progress.
required:
  - reviewMarkdown
properties:
  reviewMarkdown:
    type: string
    description: Markdown review with sections for what the reviewer understood, target words, corrections and a natural version, alternatives, and overall feedback.
    example: |-
      ## What I understood
      You mean: “My friend advised me to visit Morocco, known for its beautiful nature.” The meaning is clear.

      ## Target words
      - **يَنْصَح** works naturally here.
      - **تَصْوِيرَة** is a natural Tunisian word for a picture; in MSA, use **صورة**.

      ## Corrections and a natural version
      Consider **المعروفة بطبيعتها الجميلة** for a more natural phrase.

      ## Alternatives
      In MSA, **ذهبتُ إلى المغرب** is a useful alternative to the Tunisian travel phrasing.

      ## Overall feedback
      Your sentence communicates the experience well. The main improvement is choosing a more natural phrase for Morocco’s nature.
