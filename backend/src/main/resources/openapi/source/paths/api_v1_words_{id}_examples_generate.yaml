post:
  summary: Generate AI example sentences (ephemeral — does not persist)
  operationId: generateWordExamples
  tags:
    - words
    - ai
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: AI-generated example sentences
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AiExamplesResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '503':
      description: AI not configured (OPENROUTER_API_KEY missing)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
