openapi: 3.0.3
info:
  title: Qalam API
  description: Personal Arabic learning tool — backend API
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:8085
    description: Local development
tags:
  - name: roots
    description: Arabic root management
  - name: words
    description: Vocabulary word management
  - name: texts
    description: Arabic text management
  - name: sentences
    description: Sentence and alignment token management
  - name: transliteration
    description: Arabic text transliteration
  - name: annotations
    description: Annotation management (vocabulary, grammar, cultural, structure notes)
  - name: training
    description: Flashcard training sessions and statistics
  - name: exercises
    description: Backend-generated exercise sessions for mobile practice
  - name: word-lists
    description: Curated topical vocabulary lists (e.g. Colors, Family)
  - name: ai
    description: AI-powered linguistic analysis
  - name: analytics
    description: Aggregated statistics across all domains
  - name: conjugation
    description: Verb conjugation engine (rule-based, on-the-fly computation)
  - name: system
    description: Health and API introspection
