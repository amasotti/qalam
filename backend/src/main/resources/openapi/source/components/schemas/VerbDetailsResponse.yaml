type: object
required:
  - verbForm
  - weaknessType
  - createdAt
  - updatedAt
properties:
  verbForm:
    type: string
    enum:
      - I
      - II
      - III
      - IV
      - V
      - VI
      - VII
      - VIII
      - IX
      - X
  pastPattern:
    type: string
    nullable: true
    description: Form I vowel pattern, e.g. fa3ala, fa3ila, fa3ula
  presentPattern:
    type: string
    nullable: true
    description: Form I vowel pattern, e.g. yaf3ulu, yaf3ilu, yaf3alu
  weaknessType:
    type: string
    enum:
      - SOUND
      - ASSIMILATED
      - HOLLOW
      - GEMINATE
      - DEFECTIVE
      - DOUBLY_WEAK
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
