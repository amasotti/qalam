openapi: "3.1.0"
info:
  title: Qalam API
  description: Personal Arabic learning tool — backend API
  version: "0.1.0"

servers:
  - url: http://localhost:8085
    description: Local development

paths:
  /api/v1/roots:
    get:
      summary: List Arabic roots
      operationId: listRoots
      tags: [roots]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: letterCount
          in: query
          schema: { type: integer, minimum: 2, maximum: 6 }
      responses:
        "200":
          description: Paginated list of roots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/RootResponse"
    post:
      summary: Create a new Arabic root
      operationId: createRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRootRequest"
      responses:
        "201":
          description: Root created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/normalize:
    post:
      summary: Normalize an Arabic root input without persisting it
      operationId: normalizeRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NormalizeRequest"
      responses:
        "200":
          description: Normalized form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/{id}:
    get:
      summary: Get a root by ID
      operationId: getRootById
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Root found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a root's meaning or analysis
      operationId: updateRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRootRequest"
      responses:
        "200":
          description: Root updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a root
      operationId: deleteRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Root deleted
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/openapi.json:
    get:
      summary: OpenAPI specification
      operationId: getOpenApiSpec
      tags: [system]
      responses:
        "200":
          description: OpenAPI document

  /api/v1/swagger-ui:
    get:
      summary: Swagger UI
      operationId: getSwaggerUi
      tags: [system]
      responses:
        "200":
          description: Swagger UI HTML

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    RootResponse:
      type: object
      required: [id, letters, normalizedForm, displayForm, letterCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRootRequest:
      type: object
      required: [letters]
      properties:
        root:
          type: string
          minItems: 2
          maxItems: 6
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    UpdateRootRequest:
      type: object
      properties:
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    NormalizeRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: "Letters in any supported format: space-separated, dash-separated, comma-separated, or concatenated"

    NormalizeResponse:
      type: object
      required: [letters, normalizedForm, displayForm, letterCount]
      properties:
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code

    PaginatedResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
          format: int64
          description: Total number of matching records
        page:
          type: integer
          description: Current page (1-based)
        size:
          type: integer
          description: Page size requested
