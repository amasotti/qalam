get:
  summary: Count eligible verbs for a conjugation exercise
  operationId: getConjugationExerciseEligibility
  tags:
    - conjugation-exercises
  parameters:
    - name: mode
      in: query
      schema:
        type: string
        enum:
          - NEW
          - LEARNING
          - KNOWN
          - MIXED
        default: MIXED
    - name: wordListId
      in: query
      description: Repeat to constrain eligible verbs to selected lists.
      schema:
        type: array
        items:
          type: string
          format: uuid
  responses:
    '200':
      description: Count for current composer filters
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ConjugationExerciseEligibilityResponse.yaml
    '400':
      description: Invalid filter
