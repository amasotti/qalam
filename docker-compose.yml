services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: qalam
      POSTGRES_USER: qalam
      POSTGRES_PASSWORD: qalam
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qalam -d qalam"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - qalam-network
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    image: qalam/backend:latest
    container_name: qalam-backend
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN:?Set DOPPLER_TOKEN}
      - DOPPLER_CONFIG=dev
      - DOPPLER_PROJECT=qalam
      - DATABASE_URL=jdbc:postgresql://db:5432/qalam
      - TZ=Europe/Berlin
    networks:
      - qalam-network

volumes:
  pgdata:

networks:
  qalam-network:
    driver: bridge
