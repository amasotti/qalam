<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320"
     role="img" aria-label="Qalam — Personal Arabic Learning Tool">
  <defs>
    <linearGradient id="gp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="320" fill="#0d1710"/>

  <!-- ── Green left panel ── -->
  <rect x="0" y="0" width="380" height="320" fill="url(#gp)"/>

  <!-- Concentric circle geometry in left panel -->
  <circle cx="190" cy="160" r="148" fill="none" stroke="white" stroke-width="0.7" opacity="0.10"/>
  <circle cx="190" cy="160" r="108" fill="none" stroke="white" stroke-width="0.6" opacity="0.08"/>
  <circle cx="190" cy="160" r="68"  fill="none" stroke="white" stroke-width="0.5" opacity="0.07"/>
  <!-- Cross guides -->
  <line x1="190" y1="12"  x2="190" y2="308" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="42"  y1="160" x2="338" y2="160" stroke="white" stroke-width="0.5" opacity="0.08"/>

  <!-- Arabic قلم — large, white, centred in green panel -->
  <text x="190" y="200"
    font-family="'Noto Naskh Arabic','Amiri','Scheherazade New','Traditional Arabic',serif"
    font-size="148" font-weight="700"
    text-anchor="middle"
    fill="white" opacity="0.93"
    xml:lang="ar" direction="rtl">قلم</text>

  <!-- ── Red margin divider ── -->
  <rect x="377" y="0" width="4" height="320" fill="#dc2626"/>

  <!-- ── Manuscript ruling lines in right section ── -->
  <line x1="400" y1="53"  x2="1185" y2="53"  stroke="#16a34a" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="85"  x2="1185" y2="85"  stroke="#16a34a" stroke-width="0.5" opacity="0.10"/>
  <line x1="400" y1="117" x2="1185" y2="117" stroke="#16a34a" stroke-width="0.5" opacity="0.10"/>
  <line x1="400" y1="149" x2="1185" y2="149" stroke="#16a34a" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="213" x2="1185" y2="213" stroke="#16a34a" stroke-width="0.5" opacity="0.10"/>
  <line x1="400" y1="245" x2="1185" y2="245" stroke="#16a34a" stroke-width="0.5" opacity="0.10"/>
  <line x1="400" y1="277" x2="1185" y2="277" stroke="#16a34a" stroke-width="0.5" opacity="0.08"/>

  <!-- ── QALAM — main display text ── -->
  <text x="436" y="186"
    font-family="Georgia,'Times New Roman',serif"
    font-size="72" font-weight="700"
    letter-spacing="14"
    fill="#f1f5f9" opacity="0.92">QALAM</text>

  <!-- Red accent underline -->
  <line x1="436" y1="200" x2="762" y2="200" stroke="#dc2626" stroke-width="2" opacity="0.85"/>

  <!-- Tagline -->
  <text x="438" y="228"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="13" font-weight="300"
    letter-spacing="4"
    fill="#4ade80" opacity="0.50">PERSONAL ARABIC LEARNING TOOL</text>

  <!-- ── Bottom-right ornament: concentric circles ── -->
  <circle cx="1150" cy="285" r="52" fill="none" stroke="#16a34a" stroke-width="0.6" opacity="0.18"/>
  <circle cx="1150" cy="285" r="38" fill="none" stroke="#16a34a" stroke-width="0.5" opacity="0.14"/>
  <circle cx="1150" cy="285" r="24" fill="none" stroke="#16a34a" stroke-width="0.5" opacity="0.12"/>
  <circle cx="1150" cy="285" r="10" fill="none" stroke="#16a34a" stroke-width="0.4" opacity="0.10"/>
  <circle cx="1150" cy="285" r="3"  fill="#16a34a" opacity="0.25"/>
</svg>
