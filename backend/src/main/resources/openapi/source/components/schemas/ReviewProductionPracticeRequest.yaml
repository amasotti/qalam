type: object
description: A stateless request to review one learner-authored Arabic sentence against its displayed prompt words.
required:
  - sentence
  - targetWordIds
  - usedWordIds
properties:
  sentence:
    type: string
    description: Learner-authored Arabic sentence to review. Leading and trailing whitespace is ignored.
    minLength: 1
    maxLength: 1000
    example: أكتب كتابًا كبيرًا في البيت.
  intendedMeaning:
    type: string
    nullable: true
    description: Optional gloss, in any language, of what the learner intended to say. Blank input is treated as absent.
    maxLength: 1000
    example: I am writing a big book at home.
  targetWordIds:
    type: array
    description: Exactly the seven distinct word IDs displayed in the current prompt. The server reloads canonical word data from these IDs.
    minItems: 7
    maxItems: 7
    uniqueItems: true
    items:
      type: string
      format: uuid
    example:
      - 11111111-1111-1111-1111-111111111111
      - 22222222-2222-2222-2222-222222222222
      - 33333333-3333-3333-3333-333333333333
      - 44444444-4444-4444-4444-444444444444
      - 55555555-5555-5555-5555-555555555555
      - 66666666-6666-6666-6666-666666666666
      - 77777777-7777-7777-7777-777777777777
  usedWordIds:
    type: array
    description: At least two distinct IDs from targetWordIds that the learner intended to use. This records intent; it does not mechanically prove an inflected surface form.
    minItems: 2
    uniqueItems: true
    items:
      type: string
      format: uuid
    example:
      - 11111111-1111-1111-1111-111111111111
      - 33333333-3333-3333-3333-333333333333
