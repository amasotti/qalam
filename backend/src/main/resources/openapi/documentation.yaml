    SentenceResponse:
      type: object
      required: [id, textId, position, arabicText, tokensValid, tokens, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        textId:
          type: string
          format: uuid
        position:
          type: integer
          description: 1-based ordering within the text
        arabicText:
          type: string
        transliteration:
          type: string
          nullable: true
        freeTranslation:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        tokensValid:
          type: boolean
          description: False when arabicText was edited after tokenization
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/AlignmentTokenResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSentenceRequest:
      type: object
      required: [arabicText]
      properties:
        arabicText:
          type: string
        position:
