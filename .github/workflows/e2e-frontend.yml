name: E2E — Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: qalam
          POSTGRES_USER: qalam
          POSTGRES_PASSWORD: qalam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      # ── Backend ──────────────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Build backend distribution
        working-directory: backend
        run: ./gradlew installDist --no-daemon

      - name: Start backend
        run: |
          nohup backend/build/install/qalam-backend/bin/qalam-backend > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/qalam
          DATABASE_USER: qalam
          DATABASE_PASSWORD: qalam

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8085/api/v1/words > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "=== Backend failed to start ==="
          cat /tmp/backend.log
          exit 1

      # ── Frontend + Playwright ─────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright + Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: pnpm exec playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 3

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 3
