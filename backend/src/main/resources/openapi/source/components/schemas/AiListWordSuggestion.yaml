type: object
required:
  - arabicText
  - dialect
properties:
  arabicText:
    type: string
  transliteration:
    type: string
    nullable: true
  translation:
    type: string
    nullable: true
  partOfSpeech:
    type: string
    nullable: true
  difficulty:
    type: string
    nullable: true
  dialect:
    allOf:
      - $ref: ./Dialect.yaml
