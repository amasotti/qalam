security: []

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    # --- Roots ---

    RootResponse:
      type: object
      required: [id, letters, normalizedForm, displayForm, letterCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRootRequest:
      type: object
      required: [root]
      properties:
        root:
          type: string
          description: "Letters in any format: space/dash/comma-separated or concatenated"
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    UpdateRootRequest:
      type: object
      properties:
        meaning:
          type: string
          nullable: true
        analysis:
          type: string
          nullable: true

    NormalizeRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: "Letters in any supported format: space-separated, dash-separated, comma-separated, or concatenated"

    NormalizeResponse:
      type: object
      required: [letters, normalizedForm, displayForm, letterCount]
      properties:
        letters:
          type: array
          items: { type: string }
        normalizedForm:
          type: string
        displayForm:
          type: string
        letterCount:
          type: integer

    # --- Words ---

    WordResponse:
      type: object
      required: [id, arabicText, partOfSpeech, dialect, difficulty, masteryLevel, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        arabicText:
          type: string
        transliteration:
          type: string
          nullable: true
        translation:
          type: string
          nullable: true
