post:
  summary: Review an ephemeral production-practice sentence
  description: Validates the learner's seven displayed target IDs and submits the sentence to the configured AI reviewer. Neither the request nor feedback is persisted.
  operationId: reviewProductionPracticeSentence
  tags:
    - production-practice
    - ai
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ReviewProductionPracticeRequest.yaml
        example:
          sentence: أكتب كتابًا كبيرًا في البيت.
          targetWordIds:
            - 11111111-1111-1111-1111-111111111111
            - 22222222-2222-2222-2222-222222222222
            - 33333333-3333-3333-3333-333333333333
            - 44444444-4444-4444-4444-444444444444
            - 55555555-5555-5555-5555-555555555555
            - 66666666-6666-6666-6666-666666666666
            - 77777777-7777-7777-7777-777777777777
          usedWordIds:
            - 11111111-1111-1111-1111-111111111111
            - 33333333-3333-3333-3333-333333333333
  responses:
    '200':
      description: Structured AI feedback for the submitted sentence
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProductionPracticeReviewResponse.yaml
          example:
            verdict: GOOD
            wordFeedback:
              - wordId: 11111111-1111-1111-1111-111111111111
                usedNaturally: true
                note: Used naturally as the direct object.
              - wordId: 22222222-2222-2222-2222-222222222222
                usedNaturally: true
                note: Used naturally in the prepositional phrase.
              - wordId: 33333333-3333-3333-3333-333333333333
                usedNaturally: true
                note: Used naturally as the main verb.
              - wordId: 44444444-4444-4444-4444-444444444444
                usedNaturally: false
                note: Not used in this sentence.
              - wordId: 55555555-5555-5555-5555-555555555555
                usedNaturally: true
                note: Used naturally to describe the book.
              - wordId: 66666666-6666-6666-6666-666666666666
                usedNaturally: false
                note: Not used in this sentence.
              - wordId: 77777777-7777-7777-7777-777777777777
                usedNaturally: false
                note: Not used in this sentence.
            corrections: []
            improvedSentence: أكتب كتابًا كبيرًا في البيت.
            comment: Good use of the target noun and verb; the sentence is natural.
    '400':
      description: Malformed UUID or invalid AI provider response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: One or more target words do not exist
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '422':
      description: Sentence or selected-word validation failed
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '503':
      description: AI not configured (OPENROUTER_API_KEY missing)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
