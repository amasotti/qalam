get:
  summary: List plural forms for a word
  operationId: getWordPlurals
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: List of plural forms
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/WordPluralResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
post:
  summary: Add a plural form to a word
  operationId: addWordPlural
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateWordPluralRequest.yaml
  responses:
    '201':
      description: Plural form added
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WordPluralResponse.yaml
    '422':
      description: Validation error (blank pluralForm)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
