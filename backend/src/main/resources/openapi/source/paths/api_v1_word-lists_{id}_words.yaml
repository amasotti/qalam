post:
  summary: Add an existing word to a list (appended at the end)
  operationId: addWordToList
  tags:
    - word-lists
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AddWordToListRequest.yaml
  responses:
    '204':
      description: Word added to the list
    '400':
      description: Malformed UUID
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: List or word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '409':
      description: Word is already in the list
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
