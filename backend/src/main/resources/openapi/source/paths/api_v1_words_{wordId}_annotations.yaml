get:
  summary: List annotations linked to a word (reverse lookup)
  operationId: getAnnotationsForWord
  tags:
    - annotations
  parameters:
    - name: wordId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: List of annotations linked to the word
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/AnnotationResponse.yaml
    '400':
      description: Malformed UUID
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
