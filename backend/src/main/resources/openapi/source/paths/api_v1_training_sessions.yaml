post:
  summary: Create a new training session
  operationId: createTrainingSession
  tags:
    - training
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateSessionRequest.yaml
  responses:
    '201':
      description: Training session created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TrainingSessionResponse.yaml
    '400':
      description: Invalid request (missing/invalid mode, size, or dialect)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '422':
      description: No words available for the requested size
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
get:
  summary: List training sessions with pagination
  operationId: listTrainingSessions
  tags:
    - training
  parameters:
    - name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
    - name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 20
        maximum: 500
  responses:
    '200':
      description: Paginated list of training sessions
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PaginatedSessionsResponse.yaml
    '400':
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
