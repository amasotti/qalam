ktor {
    deployment {
        port = 8085
        port = ${?PORT}
    }
    application {
        modules = [ com.tonihacks.qalam.ApplicationKt.module ]
    }
}

database {
    url      = "jdbc:postgresql://localhost:5431/qalam"
    url      = ${?DATABASE_URL}
    user     = "qalam"
    user     = ${?DATABASE_USER}
    password = "qalam"
    password = ${?DATABASE_PASSWORD}

    pool {
        maximumPoolSize   = 7
        minimumIdle       = 2
        connectionTimeout = 30000
        idleTimeout       = 600000
        maxLifetime       = 1800000
    }
}
