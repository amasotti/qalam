get:
  summary: Get morphology data for a word (gender, plurals)
  operationId: getWordMorphology
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Morphology data
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WordMorphologyResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
put:
  summary: Upsert morphology fields (gender) for a word
  operationId: upsertWordMorphology
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertWordMorphologyRequest.yaml
  responses:
    '200':
      description: Updated morphology data
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WordMorphologyResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
