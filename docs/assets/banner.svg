<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320"
     role="img" aria-label="Qalam — Personal Arabic Learning Tool">
  <defs>
    <!-- ── Background: warm parchment ── -->
    <radialGradient id="bg" cx="0.4" cy="0.5" r="0.75">
      <stop offset="0%"   stop-color="#F9F8F1"/>
      <stop offset="100%" stop-color="#EEE8DC"/>
    </radialGradient>

    <!-- ── Bottom bar: olive → coral ── -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A6228"/>
      <stop offset="100%" stop-color="#C04830"/>
    </linearGradient>

    <!-- ── Glow halo on Arabic text ── -->
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Soft atmospheric bloom (background only) ── -->
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="55"/>
    </filter>

    <!-- ── Geometric lattice tile 32×32 (olive) ── -->
    <pattern id="lat" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <line x1="0"  y1="16" x2="32" y2="16" stroke="#4A6228" stroke-width="0.35"/>
      <line x1="16" y1="0"  x2="16" y2="32" stroke="#4A6228" stroke-width="0.35"/>
      <line x1="0"  y1="0"  x2="32" y2="32" stroke="#4A6228" stroke-width="0.22"/>
      <line x1="32" y1="0"  x2="0"  y2="32" stroke="#4A6228" stroke-width="0.22"/>
      <circle cx="0"  cy="0"  r="1.1" fill="#4A6228"/>
      <circle cx="32" cy="0"  r="1.1" fill="#4A6228"/>
      <circle cx="0"  cy="32" r="1.1" fill="#4A6228"/>
      <circle cx="32" cy="32" r="1.1" fill="#4A6228"/>
      <circle cx="16" cy="16" r="1.4" fill="#4A6228"/>
    </pattern>
  </defs>

  <!-- ── Base: warm parchment ── -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- ── Lattice texture (very subtle) ── -->
  <rect width="1200" height="320" fill="url(#lat)" opacity="0.055"/>

  <!-- ── Atmospheric olive bloom behind Arabic area ── -->
  <ellipse cx="420" cy="158" rx="295" ry="168"
           fill="#4A6228" opacity="0.05" filter="url(#bloom)"/>

  <!-- ── Khatam ornament, upper-right (olive + coral jewel) ── -->
  <circle cx="1134" cy="58" r="48" fill="none" stroke="#4A6228" stroke-width="0.6" opacity="0.22"/>
  <path transform="translate(1134,58)"
        d="M0,-36 L5.35,-13.3 L25.46,-25.46 L13.3,-5.35 L36,0
           L13.3,5.35 L25.46,25.46 L5.35,13.3 L0,36
           L-5.35,13.3 L-25.46,25.46 L-13.3,5.35 L-36,0
           L-13.3,-5.35 L-25.46,-25.46 L-5.35,-13.3 Z"
        fill="none" stroke="#4A6228" stroke-width="0.6" opacity="0.28"/>
  <circle cx="1134" cy="58" r="25" fill="none" stroke="#4A6228" stroke-width="0.5" opacity="0.18"/>
  <path transform="translate(1134,58)"
        d="M0,-18 L2.68,-6.65 L12.73,-12.73 L6.65,-2.68 L18,0
           L6.65,2.68 L12.73,12.73 L2.68,6.65 L0,18
           L-2.68,6.65 L-12.73,12.73 L-6.65,2.68 L-18,0
           L-6.65,-2.68 L-12.73,-12.73 L-2.68,-6.65 Z"
        fill="none" stroke="#4A6228" stroke-width="0.5" opacity="0.24"/>
  <circle cx="1134" cy="58" r="3.5" fill="#C04830" opacity="0.55"/>

  <!-- ── Echo ornament, lower-left (olive + coral jewel) ── -->
  <circle cx="66" cy="262" r="30" fill="none" stroke="#4A6228" stroke-width="0.5" opacity="0.16"/>
  <path transform="translate(66,262)"
        d="M0,-22 L3.26,-8.12 L15.56,-15.56 L8.12,-3.26 L22,0
           L8.12,3.26 L15.56,15.56 L3.26,8.12 L0,22
           L-3.26,8.12 L-15.56,15.56 L-8.12,3.26 L-22,0
           L-8.12,-3.26 L-15.56,-15.56 L-3.26,-8.12 Z"
        fill="none" stroke="#4A6228" stroke-width="0.5" opacity="0.20"/>
  <circle cx="66" cy="262" r="3" fill="#C04830" opacity="0.40"/>

  <!-- ════════════════════════════════════════
       ARABIC قلم — hero
  ════════════════════════════════════════ -->

  <!-- Pass 1: glow (olive, blurred) -->
  <text x="425" y="232"
    font-family="'Amiri','Noto Naskh Arabic','Scheherazade New','Traditional Arabic',serif"
    font-size="212" font-weight="400"
    text-anchor="middle"
    fill="#4A6228" opacity="0.14"
    filter="url(#glow)"
    xml:lang="ar">قلم</text>

  <!-- Pass 2: crisp, solid olive -->
  <text x="425" y="232"
    font-family="'Amiri','Noto Naskh Arabic','Scheherazade New','Traditional Arabic',serif"
    font-size="212" font-weight="400"
    text-anchor="middle"
    fill="#4A6228"
    xml:lang="ar">قلم</text>

  <!-- ════════════════════════════════════════
       SEPARATOR
  ════════════════════════════════════════ -->
  <line x1="720" y1="38" x2="720" y2="282" stroke="#DDD5C0" stroke-width="1.5" opacity="0.90"/>

  <!-- ════════════════════════════════════════
       LATIN IDENTITY (right panel)
  ════════════════════════════════════════ -->

  <!-- "Qalam" — Lora serif, ink -->
  <text x="762" y="158"
    font-family="'Lora','Georgia','Times New Roman',serif"
    font-size="66" font-weight="600"
    letter-spacing="8"
    fill="#1A1810" opacity="0.88">Qalam</text>

  <!-- Coral accent underline -->
  <line x1="762" y1="172" x2="1010" y2="172" stroke="#C04830" stroke-width="2.5" opacity="0.75"/>

  <!-- Transliteration — olive italic -->
  <text x="764" y="200"
    font-family="'Lora','Georgia',serif"
    font-size="14" font-style="italic"
    fill="#4A6228" opacity="0.82">qalam · pen, writing instrument</text>

  <!-- Tagline -->
  <text x="764" y="232"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-size="12" font-weight="400"
    letter-spacing="3.8"
    fill="#786848">PERSONAL ARABIC LEARNING TOOL</text>

  <!-- ── Bottom accent bar: olive → coral ── -->
  <rect x="0" y="314" width="1200" height="4" fill="url(#bar-grad)" opacity="0.70"/>
</svg>
