delete:
  summary: Delete a saved example sentence
  operationId: deleteWordExample
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: exampleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Example deleted
    '404':
      description: Word or example not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
