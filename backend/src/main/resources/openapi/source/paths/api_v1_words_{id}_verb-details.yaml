get:
  summary: Get verb-specific details (form, vowel patterns, weakness type)
  operationId: getVerbDetails
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Verb details (empty object if none)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/VerbDetailsResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
put:
  summary: Upsert verb details for a word
  operationId: upsertVerbDetails
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpsertVerbDetailsRequest.yaml
  responses:
    '200':
      description: Updated verb details
      content:
        application/json:
          schema:
            $ref: ../components/schemas/VerbDetailsResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
delete:
  summary: Delete verb details for a word
  operationId: deleteVerbDetails
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Deleted
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
