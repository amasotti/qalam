get:
  summary: Get a word list with its ordered member words
  operationId: getWordListById
  tags:
    - word-lists
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Word list found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WordListDetailResponse.yaml
    '400':
      description: Malformed UUID
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: Word list not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
patch:
  summary: Update a word list's title or description
  operationId: updateWordList
  tags:
    - word-lists
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateWordListRequest.yaml
  responses:
    '200':
      description: Word list updated
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WordListResponse.yaml
    '404':
      description: Word list not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '422':
      description: Validation error (e.g. blank title)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
delete:
  summary: Delete a word list
  operationId: deleteWordList
  tags:
    - word-lists
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Word list deleted
    '404':
      description: Word list not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
