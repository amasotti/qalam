type: object
required:
  - plurals
  - relations
properties:
  notes:
    type: string
    nullable: true
  gender:
    type: string
    nullable: true
    enum:
      - MASCULINE
      - FEMININE
  verbPattern:
    type: string
    nullable: true
    deprecated: true
    enum:
      - I
      - II
      - III
      - IV
      - V
      - VI
      - VII
      - VIII
      - IX
      - X
  verbDetails:
    type: object
    nullable: true
    allOf:
      - $ref: ./AiVerbDetailsSuggestion.yaml
  plurals:
    type: array
    items:
      $ref: ./AiPluralSuggestion.yaml
  relations:
    type: array
    items:
      $ref: ./AiRelationSuggestion.yaml
