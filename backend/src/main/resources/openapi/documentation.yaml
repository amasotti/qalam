openapi: "3.0.3"
info:
  title: Qalam API
  description: Personal Arabic learning tool — backend API
  version: "0.1.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8085
    description: Local development

tags:
  - name: roots
    description: Arabic root management
  - name: words
    description: Vocabulary word management
  - name: texts
    description: Arabic text management
  - name: sentences
    description: Sentence and alignment token management
  - name: transliteration
    description: Arabic text transliteration
  - name: annotations
    description: Annotation management (vocabulary, grammar, cultural, structure notes)
  - name: training
    description: Flashcard training sessions and statistics
  - name: ai
    description: AI-powered linguistic analysis
  - name: system
    description: Health and API introspection

paths:
  /api/v1/roots:
    get:
      summary: List Arabic roots
      operationId: listRoots
      tags: [roots]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: letterCount
          in: query
          description: Filter by number of root letters (2–6)
          schema: { type: integer, minimum: 2, maximum: 6 }
      responses:
        "200":
          description: Paginated list of roots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a new Arabic root
      operationId: createRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRootRequest"
      responses:
        "201":
          description: Root created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/normalize:
    post:
      summary: Normalize an Arabic root input without persisting it
      operationId: normalizeRoot
      tags: [roots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NormalizeRequest"
      responses:
        "200":
          description: Normalized form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NormalizeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/roots/{id}:
    get:
      summary: Get a root by ID
      operationId: getRootById
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Root found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a root's meaning or analysis
      operationId: updateRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRootRequest"
      responses:
        "200":
          description: Root updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a root
      operationId: deleteRoot
      tags: [roots]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Root deleted
        "404":
          description: Root not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words:
    get:
      summary: List vocabulary words with optional filters
      operationId: listWords
      tags: [words]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: q
          in: query
          description: Arabic text substring search
          schema: { type: string }
        - name: rootId
          in: query
          description: Filter words by root UUID
          schema: { type: string, format: uuid }
        - name: dialect
          in: query
          schema: { $ref: "#/components/schemas/Dialect" }
        - name: difficulty
          in: query
          schema: { $ref: "#/components/schemas/Difficulty" }
        - name: partOfSpeech
          in: query
          schema: { $ref: "#/components/schemas/PartOfSpeech" }
        - name: masteryLevel
          in: query
          schema: { $ref: "#/components/schemas/MasteryLevel" }
      responses:
        "200":
          description: Paginated list of words
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/WordResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a vocabulary word
      operationId: createWord
      tags: [words]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordRequest"
      responses:
        "201":
          description: Word created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "422":
          description: Validation error (blank arabicText, unknown enum value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/autocomplete:
    get:
      summary: Lightweight word search for linking operations
      operationId: autocompleteWords
      tags: [words]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Matching words (id + arabicText + translation only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordAutocompleteResponse"
        "400":
          description: Missing required query parameter `q`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/by-arabic:
    get:
      summary: Look up a word by exact Arabic text
      operationId: getWordByArabic
      tags: [words]
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: Exact Arabic text to match
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "404":
          description: No word with that exact Arabic text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Missing required query parameter `q`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/analyze:
    post:
      summary: AI word analysis (ephemeral — does not persist)
      operationId: analyzeWord
      tags: [words]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeWordRequest"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordAnalysisResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}:
    get:
      summary: Get a word by ID
      operationId: getWordById
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a word (all fields optional — only provided fields change)
      operationId: updateWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWordRequest"
      responses:
        "200":
          description: Word updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a word
      operationId: deleteWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Word deleted
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links:
    get:
      summary: List dictionary links for a word
      operationId: listDictionaryLinks
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of dictionary links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add a dictionary link to a word
      operationId: addDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDictionaryLinkRequest"
      responses:
        "201":
          description: Link added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DictionaryLinkResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unknown dictionary source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/dictionary-links/{linkId}:
    delete:
      summary: Remove a dictionary link from a word
      operationId: deleteDictionaryLink
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: linkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Link removed
        "404":
          description: Word or link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/examples:
    get:
      summary: List saved example sentences for a word
      operationId: listWordExamples
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of saved examples
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordExampleResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Save an example sentence for a word
      operationId: saveWordExample
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordExampleRequest"
      responses:
        "201":
          description: Example saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordExampleResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/examples/{exampleId}:
    delete:
      summary: Delete a saved example sentence
      operationId: deleteWordExample
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: exampleId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Example deleted
        "404":
          description: Word or example not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/examples/generate:
    post:
      summary: Generate AI example sentences (ephemeral — does not persist)
      operationId: generateWordExamples
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: AI-generated example sentences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiExamplesResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/morphology:
    get:
      summary: Get morphology data for a word (gender, verb pattern, plurals)
      operationId: getWordMorphology
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Morphology data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordMorphologyResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Upsert morphology fields (gender, verb pattern) for a word
      operationId: upsertWordMorphology
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertWordMorphologyRequest"
      responses:
        "200":
          description: Updated morphology data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordMorphologyResponse"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/plurals:
    get:
      summary: List plural forms for a word
      operationId: getWordPlurals
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of plural forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordPluralResponse"
    post:
      summary: Add a plural form to a word
      operationId: addWordPlural
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordPluralRequest"
      responses:
        "201":
          description: Plural form added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordPluralResponse"
        "422":
          description: Validation error (blank pluralForm)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/plurals/{pluralId}:
    delete:
      summary: Delete a plural form from a word
      operationId: deleteWordPlural
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: pluralId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Plural form deleted
        "404":
          description: Word or plural not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/relations:
    get:
      summary: List semantic relations for a word (synonyms, antonyms, related)
      operationId: getWordRelations
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of word relations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WordRelationResponse"
    post:
      summary: Add a semantic relation to a word
      operationId: addWordRelation
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWordRelationRequest"
      responses:
        "201":
          description: Relation added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordRelationResponse"
        "409":
          description: Relation already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/relations/{relatedWordId}/{type}:
    delete:
      summary: Delete a semantic relation from a word
      operationId: deleteWordRelation
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: relatedWordId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [SYNONYM, ANTONYM, RELATED]
      responses:
        "204":
          description: Relation deleted
        "404":
          description: Word or relation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/words/{id}/enrich:
    post:
      summary: AI-powered word enrichment suggestions (ephemeral — does not persist)
      operationId: enrichWord
      tags: [words]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: AI enrichment suggestions (gender, verb pattern, plurals, relations)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordEnrichmentSuggestion"
        "404":
          description: Word not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured (OPENROUTER_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts:
    get:
      summary: List texts with optional filters
      operationId: listTexts
      tags: [texts]
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          description: Number of items per page
          schema: { type: integer, default: 20, maximum: 100 }
        - name: q
          in: query
          description: Free-text search across title and body
          schema: { type: string }
        - name: dialect
          in: query
          schema: { $ref: "#/components/schemas/Dialect" }
        - name: difficulty
          in: query
          schema: { $ref: "#/components/schemas/Difficulty" }
        - name: tag
          in: query
          description: Filter by tag (exact match)
          schema: { type: string }
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [CREATED_AT, UPDATED_AT, TITLE]
            default: CREATED_AT
        - name: sortDesc
          in: query
          description: Sort descending (true = newest/Z first)
          schema: { type: boolean, default: true }
      responses:
        "200":
          description: Paginated list of texts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/TextResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a text
      operationId: createText
      tags: [texts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTextRequest"
      responses:
        "201":
          description: Text created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "422":
          description: Validation error (blank title or body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/texts/{id}:
    get:
      summary: Get a text by ID
      operationId: getTextById
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Text found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "400":
          description: Malformed UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Text not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a text (all fields optional — only provided fields change)
      operationId: updateText
      tags: [texts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTextRequest"
      responses:
        "200":
          description: Text updated
          content:
