type: object
required:
  - id
  - mode
  - status
  - tense
  - voice
  - totalItems
  - correctCount
  - incorrectCount
  - skippedCount
  - accuracy
  - createdAt
properties:
  id:
    type: string
    format: uuid
  mode:
    type: string
    enum:
      - NEW
      - LEARNING
      - KNOWN
      - MIXED
  status:
    type: string
    enum:
      - ACTIVE
      - COMPLETED
  tense:
    type: string
    enum:
      - PAST
      - PRESENT
  voice:
    type: string
    enum:
      - ACTIVE
      - PASSIVE
  totalItems:
    type: integer
  correctCount:
    type: integer
  incorrectCount:
    type: integer
  skippedCount:
    type: integer
  accuracy:
    type: number
    format: double
  createdAt:
    type: string
    format: date-time
  completedAt:
    type: string
    format: date-time
    nullable: true
