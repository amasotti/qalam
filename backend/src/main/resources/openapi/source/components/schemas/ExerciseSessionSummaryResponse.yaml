type: object
required:
  - sessionId
  - mode
  - totalItems
  - correct
  - incorrect
  - skipped
  - accuracy
  - promotions
  - completedAt
properties:
  sessionId:
    type: string
    format: uuid
  mode:
    type: string
    enum:
      - NEW
      - LEARNING
      - KNOWN
      - MIXED
  totalItems:
    type: integer
  correct:
    type: integer
  incorrect:
    type: integer
  skipped:
    type: integer
  accuracy:
    type: number
    format: double
    description: Accuracy as a ratio from 0.0 to 1.0, excluding skipped items.
  promotions:
    type: array
    items:
      $ref: ./MasteryPromotionResponse.yaml
  completedAt:
    type: string
    format: date-time
