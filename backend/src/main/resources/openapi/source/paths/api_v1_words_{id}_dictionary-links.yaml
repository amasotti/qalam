get:
  summary: List dictionary links for a word
  operationId: listDictionaryLinks
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: List of dictionary links
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/DictionaryLinkResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
post:
  summary: Add a dictionary link to a word
  operationId: addDictionaryLink
  tags:
    - words
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateDictionaryLinkRequest.yaml
  responses:
    '201':
      description: Link added
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DictionaryLinkResponse.yaml
    '404':
      description: Word not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '422':
      description: Unknown dictionary source
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
