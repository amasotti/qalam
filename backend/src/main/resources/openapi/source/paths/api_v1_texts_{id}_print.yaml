get:
  summary: Render a printable HTML view of the text with sentence-level breakdown
  operationId: printText
  tags:
    - texts
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Printable HTML page
      content:
        text/html:
          schema:
            type: string
    '404':
      description: Text not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
