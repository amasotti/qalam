          type: string
          nullable: true
        presentPattern:
          type: string
          nullable: true
        weaknessType:
          type: string
          enum:
            - SOUND
            - ASSIMILATED
            - HOLLOW
            - GEMINATE
            - DEFECTIVE
            - DOUBLY_WEAK
