post:
  summary: >-
    Rebuild text body/transliteration/translation from its sentences (sentences
    are source of truth)
  operationId: syncTextFromSentences
  tags:
    - texts
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Updated text
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TextResponse.yaml
    '404':
      description: Text not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
