type: object
required:
  - id
  - sentenceId
  - position
  - arabic
properties:
  id:
    type: string
    format: uuid
  sentenceId:
    type: string
    format: uuid
  position:
    type: integer
  arabic:
    type: string
  transliteration:
    type: string
    nullable: true
  translation:
    type: string
    nullable: true
  wordId:
    type: string
    format: uuid
    nullable: true
