name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect what changed ─────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  # ── Backend: Detekt + tests + coverage ──────────────────────────────────────
  backend:
    name: Backend — lint & test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Detekt + tests + coverage
        working-directory: backend
        run: ./gradlew check koverXmlReport --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: kover-report
          path: backend/build/reports/kover/report.xml
          retention-days: 7

  # ── Frontend: lint + type-check + build ─────────────────────────────────────
  frontend:
    name: Frontend — lint, type-check & build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Type check
        working-directory: frontend
        run: pnpm check

      - name: Build
        working-directory: frontend
        run: pnpm build

  # ── OpenAPI spec lint (parallel with backend — spec is a source file) ────────
  openapi-lint:
    name: OpenAPI — lint spec
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint OpenAPI spec
        run: >
          npx --yes @redocly/cli@latest lint
          backend/src/main/resources/openapi/documentation.yaml

  # ── Docker: validate the image builds (needs backend to be green first) ──────
  docker-build:
    name: Docker — validate image build
    needs: backend
    if: needs.backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: false
          tags: qalam-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Fan-in gate for branch protection rules ──────────────────────────────────
  ci-success:
    name: CI — all checks passed
    needs: [backend, frontend, openapi-lint, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        env:
          BACKEND: ${{ needs.backend.result }}
          FRONTEND: ${{ needs.frontend.result }}
          OPENAPI: ${{ needs.openapi-lint.result }}
          DOCKER: ${{ needs.docker-build.result }}
        run: |
          for result in "$BACKEND" "$FRONTEND" "$OPENAPI" "$DOCKER"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A required job failed or was cancelled (result: $result)"
              exit 1
            fi
          done
          echo "All checks passed (or were skipped)"
